<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Facturador Masivo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2327408b'/%3E%3Cpath fill='%23fff' fill-rule='evenodd' d='M12 54 L12 24 A20 20 0 0 1 52 24 L52 54 L43 54 L43 24 A11 11 0 0 0 21 24 L21 54 Z'/%3E%3Crect x='21' y='39' width='22' height='6' rx='1' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>(function(){try{var t=localStorage.arcanumTheme||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    --bg:#f5f6f9; --panel:#fff; --ink:#1a1c22; --muted:#5f6573; --line:#e5e8ef;
    --accent:#27408b; --accent-ink:#1d2f5f; --accent-contrast:#fff; --ok:#2e7d52; --bad:#b23b3b; --warn:#b9791a;
    --chip:#e9edf6; --header-bg:rgba(245,246,249,.9); --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.05);
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  :root[data-theme="dark"]{
    --bg:#14161b; --panel:#1c1f27; --ink:#e7e9ee; --muted:#9aa1b0; --line:#2a2e38;
    --accent:#6b8bd6; --accent-ink:#bcd0ff; --accent-contrast:#10131a; --ok:#5cc08a; --bad:#e3736f; --warn:#d6a44a;
    --chip:#262b36; --header-bg:rgba(20,22,27,.9);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.4);
  }
  html,body{transition:background-color .2s ease,color .2s ease}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
  a{color:var(--accent-ink)}
  header{position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:10}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}
  .bar{display:flex;align-items:center;gap:16px;padding:13px 0}
  .logo{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:700;font-family:var(--mono)}
  .bar h1{font-size:16px;margin:0;font-weight:650}
  nav{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
  nav button{background:none;border:none;color:var(--muted);padding:7px 11px;border-radius:8px;cursor:pointer;font-size:14px}
  nav button.active{background:var(--chip);color:var(--ink);font-weight:560}
  .right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
  .env{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:999px;background:var(--chip);color:var(--accent-ink)}
  button.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-contrast)}
  button.primary:hover{filter:brightness(1.08)}
  button{font-family:var(--sans);font-size:14px;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:9px;cursor:pointer}
  button:hover{box-shadow:var(--shadow)}
  button.ghost{border:none;color:var(--accent-ink);padding:6px 9px;display:inline-flex;align-items:center;gap:5px}
  button.ghost svg,nav button svg{width:16px;height:16px}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;transition:color .15s,box-shadow .15s}
  .iconbtn:hover{color:var(--ink);box-shadow:var(--shadow)}
  .iconbtn svg{display:block;width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .menu{position:absolute;right:0;top:42px;width:250px;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;display:none;z-index:30}
  .menu.open{display:block}
  .menu-sec{padding:6px 0;border-bottom:1px solid var(--line)} .menu-sec:last-child{border-bottom:none}
  .menu-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:4px 12px}
  .menu-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 12px;font-size:14px}
  .menu-row select{width:auto;padding:5px 8px}
  .menu-item{display:flex;align-items:center;gap:9px;width:100%;border:none;background:none;padding:8px 12px;border-radius:8px;color:var(--ink);font-size:14px;cursor:pointer;text-align:left}
  .menu-item:hover{background:var(--chip)} .menu-item svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pwwrap{position:relative} .pwwrap input{padding-right:38px}
  .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;display:grid;place-items:center;color:var(--muted);cursor:pointer;background:none;border:none}
  .eye:hover{color:var(--ink)} .eye svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  main{padding:24px 0 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .stat .val{font-size:26px;font-weight:680;margin-top:6px;font-family:var(--mono)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}
  .dot.ok{background:var(--ok)} .dot.bad{background:var(--bad)} .dot.idle{background:#cabfa9}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:30px 0 12px}
  h3{font-size:15px;margin:16px 0 10px;text-transform:capitalize}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:560;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  td.mono,.mono{font-family:var(--mono)}
  input,select,textarea{font-family:var(--sans);font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);width:100%}
  textarea{font-family:var(--mono);font-size:12px;min-height:120px}
  label{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .tag{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:999px;background:var(--chip);color:var(--accent-ink)}
  .tag.rich,.tag.ok{background:var(--chip);color:var(--ok)} .tag.no{background:var(--chip);color:var(--bad)} .tag.warn{background:var(--chip);color:var(--warn)}
  .svc{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;background:var(--panel)}
  .svc .top{display:flex;align-items:center;gap:10px}
  .pasos{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;display:none}
  .pasos.open{display:block}.pasos ol{margin:0;padding-left:20px}.pasos li{margin:5px 0}
  .rel{font-family:var(--mono);background:var(--chip);padding:2px 6px;border-radius:6px}
  .bars{display:flex;align-items:flex-end;gap:5px;height:90px;margin-top:8px}
  .bars .b{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:3px;opacity:.85}
  .muted{color:var(--muted)} .hint{color:var(--muted);font-size:13px}
  .login{max-width:360px;margin:12vh auto;text-align:center}
  .login .card{padding:28px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0c0e13;color:#f3f5f9;padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:80vw;box-shadow:var(--shadow);text-align:center;word-break:break-word;line-height:1.35}
  .toast.show{opacity:1}.toast.bad{background:var(--bad)}
  .hidden{display:none}
  pre{background:#1c1a17;color:#f0ebe1;padding:12px;border-radius:10px;overflow:auto;font-family:var(--mono);font-size:11.5px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;place-items:center;z-index:20;padding:20px}
  .modal.open{display:grid}.modal .card{max-width:620px;width:100%;max-height:85vh;overflow:auto}
  .hero{background:linear-gradient(180deg,var(--panel),var(--bg));border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
  .hero h2{font-size:22px;margin:0 0 8px;text-transform:none;letter-spacing:-.2px;color:var(--ink)}
  .hero p{color:var(--muted);margin:0 0 14px;max-width:62ch}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap}
  .stat .val[data-count]{font-variant-numeric:tabular-nums}
  .reveal{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);filter:blur(4px)}to{opacity:1;transform:none;filter:none}}
  .bars .b{transition:height .7s cubic-bezier(.22,1,.36,1)}
  @media(prefers-reduced-motion:reduce){.reveal{animation:none}.bars .b{transition:none}}
  .progw{display:flex;align-items:center;gap:8px}
  .prog{height:7px;background:var(--chip);border-radius:999px;overflow:hidden;min-width:90px}
  .prog>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .6s cubic-bezier(.22,1,.36,1)}
  .progp{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:1px 6px;border-radius:999px;min-width:40px;text-align:center}
  td.num{font-family:var(--mono);text-align:right;white-space:nowrap}
  .segtbl td{vertical-align:middle}
  .perfilbtn{font-size:13px}
  .perfilbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<div id="loginView" class="login hidden">
  <div class="card">
    <div class="logo" style="margin:0 auto 14px;width:44px;height:44px;border-radius:12px"><svg viewBox="0 0 64 64" width="30" height="30" aria-hidden="true"><path fill="#fff" fill-rule="evenodd" d="M12 54 L12 24 A20 20 0 0 1 52 24 L52 54 L43 54 L43 24 A11 11 0 0 0 21 24 L21 54 Z"/><rect x="21" y="39" width="22" height="6" rx="1" fill="#fff"/></svg></div>
    <h1 style="margin:0 0 4px">Facturador Masivo</h1>
    <p class="hint" style="margin:0 0 18px">Bienvenido al portal de Emisiones Masivas en ARCA</p>
    <label style="text-align:left">Perfil</label>
    <div class="row" style="gap:8px;margin:0 0 12px">
      <button type="button" class="perfilbtn" data-p="asociacion" onclick="setPerfil('asociacion')" style="flex:1">Asociación médica</button>
      <button type="button" class="perfilbtn" data-p="pyme" onclick="setPerfil('pyme')" style="flex:1">PyME</button>
    </div>
    <label style="text-align:left">Usuario</label><input id="lu" autocomplete="username">
    <label style="text-align:left">Contraseña</label>
    <div class="pwwrap"><input id="lp" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"><button class="eye" type="button" tabindex="-1" aria-label="Mostrar u ocultar contraseña" onclick="togglePw('lp',this)"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
    <button class="primary" style="width:100%;margin-top:16px" onclick="doLogin()">Entrar</button>
    <div id="oidcBtn"></div>
  </div>
</div>

<div id="appView" class="hidden">
<header><div class="wrap bar">
  <div class="logo"><svg viewBox="0 0 64 64" width="22" height="22" aria-hidden="true"><path fill="#fff" fill-rule="evenodd" d="M12 54 L12 24 A20 20 0 0 1 52 24 L52 54 L43 54 L43 24 A11 11 0 0 0 21 24 L21 54 Z"/><rect x="21" y="39" width="22" height="6" rx="1" fill="#fff"/></svg></div><h1>Facturador Masivo</h1>
  <nav id="nav"></nav>
  <div class="right" style="position:relative"><span id="who"></span>
    <button class="iconbtn" id="menuBtn" onclick="toggleMenu()" aria-label="Menú"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    <div class="menu" id="appmenu"></div>
  </div>
</div></header>
<main class="wrap"><div id="view"></div></main>
</div>

<div class="modal" id="modal"><div class="card" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
const $=(s,e=document)=>e.querySelector(s);
let ME=null, ENV='—';
async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts});
  const ct=r.headers.get('content-type')||'';
  const j=ct.includes('json')?await r.json().catch(()=>({})):{};
  if(r.status===401){showLogin();throw new Error('401');}
  if(!r.ok)throw new Error(j.error||('HTTP '+r.status));
  return j;
}
function toast(m,bad){const t=$('#toast');t.textContent=m;t.className='toast show'+(bad?' bad':'');setTimeout(()=>t.className='toast',2600);}
function animateCounts(){document.querySelectorAll('[data-count]').forEach(el=>{const target=+el.getAttribute('data-count'),dur=850,t0=performance.now();function step(t){const p=Math.min(1,(t-t0)/dur);el.textContent=Math.round((1-Math.pow(1-p,3))*target);if(p<1)requestAnimationFrame(step);else el.textContent=target;}requestAnimationFrame(step);});}
function modal(html){$('#modalBody').innerHTML=html;$('#modal').classList.add('open');}
function closeModal(){$('#modal').classList.remove('open');}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

function showLogin(){$('#loginView').classList.remove('hidden');$('#appView').classList.add('hidden');try{setPerfil(PERFIL);}catch(_){}
  fetch('/api/auth/config').then(r=>r.json()).then(c=>{
    $('#oidcBtn').innerHTML=c.oidc?'<a href="/api/auth/oidc/login"><button style="width:100%;margin-top:8px">Entrar con Lockatus</button></a>':'';
  }).catch(()=>{});}
async function doLogin(){
  try{ await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:$('#lu').value,password:$('#lp').value})});
    await boot(); }catch(e){ toast('Usuario o contraseña inválidos',true); }
}
async function logout(){ await fetch('/api/auth/logout',{method:'POST',credentials:'include'}); showLogin(); }

let PERFIL=(()=>{try{return localStorage.getItem('arcanum_perfil')||'asociacion';}catch(_){return 'asociacion';}})();
function setPerfil(p){ PERFIL=p; try{localStorage.setItem('arcanum_perfil',p);}catch(_){}
  document.querySelectorAll('.perfilbtn').forEach(b=>b.classList.toggle('active', b.dataset.p===p)); }
const VIEWS=[['panel','Panel'],['clientes','Clientes'],['representados','Representados'],['servicios','Servicios'],['emitir','Emitir'],['comprobantes','Comprobantes'],['seguimiento','Seguimiento'],['generador','Generador'],['webhooks','Webhooks'],['usuarios','Usuarios']];
function renderNav(cur){
  $('#nav').innerHTML=VIEWS.filter(v=>v[0]!=='usuarios'||['superadmin','admin'].includes(ME.role))
    .map(v=>`<button class="${v[0]===cur?'active':''}" onclick="go('${v[0]}')">${v[1]}</button>`).join('');
}
function go(v){renderNav(v);location.hash=v;({panel:vPanel,clientes:vClientes,representados:vRepresentados,servicios:vServicios,emitir:vEmitir,comprobantes:vComprobantes,seguimiento:vSeguimiento,generador:vGenerador,webhooks:vWebhooks,usuarios:vUsuarios}[v]||vPanel)();}

async function boot(){
  try{ const me=await api('/api/auth/me'); ME=me.usuario; }catch(e){ showLogin(); return; }
  try{ const h=await fetch('/api/health').then(r=>r.json()); ENV=h.env; }catch{}
  $('#who').textContent=ME.username+' ('+ME.role+')';
  $('#loginView').classList.add('hidden');$('#appView').classList.remove('hidden');
  go((location.hash||'#panel').slice(1));
}

/* ---------- PANEL ---------- */
/* ---------- PANEL ---------- */
async function vPanel(){
  const v=$('#view');v.innerHTML='<p class="hint">Cargando métricas…</p>';
  const {metricas:m}=await api('/api/metrics');
  let sinCert=false;try{const r=await api('/api/tenants');sinCert=!r.tenants.some(t=>t.tieneCertificado);}catch{}
  const max=Math.max(1,...m.emisiones.serie.map(s=>s.n));
  const bars=m.emisiones.serie.map(s=>`<div class="b" title="${s.dia}: ${s.n}" style="height:${Math.round(s.n/max*100)}%"></div>`).join('')||'<span class="hint">sin emisiones aún</span>';
  const arca=m.arca.map(a=>`<tr><td>${a.servicio}</td><td><span class="dot ${a.ok?'ok':'bad'}"></span>${a.ok?'OK':'caído'}</td><td class="mono">${a.uptime24h??'—'}%</td><td class="mono">${a.latencia??'—'} ms</td></tr>`).join('')||'<tr><td colspan="4" class="hint">El monitor corre cada 5 min; esperá el primer chequeo.</td></tr>';
  v.innerHTML=`
   <div class="hero reveal">
     <h2>Bienvenido al portal de Emisiones Masivas en ARCA</h2>
     <p>${PERFIL==='pyme'
       ? 'Emití comprobantes electrónicos en nombre de cada cliente conectándote directo a ARCA. El sistema controla los vencimientos, permite enviarle a tus clientes las facturas por mail y te muestra el estado de los servicios en vivo.'
       : 'Emití comprobantes electrónicos en nombre de cada profesional, en lote, directo a ARCA. El sistema controla los vencimientos y te muestra el estado de los servicios en vivo.'}</p>
     <div class="pill-row">
       <span class="tag"><span class="dot ${m.arca.some(a=>a.ok)?'ok':'bad'}"></span>ARCA · ${ENV}</span>
       <span class="tag">${ME.username} (${ME.role})</span>
     </div>
   </div>
   ${sinCert?`<div class="card reveal" style="border:1px solid var(--accent);display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px"><div><strong>Todavía no cargaste ningún certificado.</strong> <span class="hint">Es lo primero para poder emitir en ARCA.</span></div><button class="primary" style="margin-left:auto" onclick="go('clientes')">Cargar mi certificado</button></div>`:''}
   <div class="grid">
     <div class="card stat reveal"><div class="label">Emisiones hoy</div><div class="val" data-count="${m.emisiones.hoy}">0</div></div>
     <div class="card stat reveal"><div class="label">Monto hoy</div><div class="val" style="font-size:20px">$${m.emisiones.montoHoy.toLocaleString('es-AR')}</div></div>
     <div class="card stat reveal"><div class="label">Certs por vencer</div><div class="val" data-count="${m.certificados.porVencer}">0</div></div>
     <div class="card stat reveal"><div class="label">Peticiones 24h</div><div class="val" data-count="${m.peticiones24h.total}">0</div><div class="hint">${m.peticiones24h.errores} errores · ${m.peticiones24h.latenciaMedia}ms</div></div>
   </div>
   <h2>Emisiones (14 días)</h2><div class="card"><div class="bars">${bars}</div></div>
   <h2>Estado de ARCA</h2><div class="card"><table><thead><tr><th>Servicio</th><th>Estado</th><th>Uptime 24h</th><th>Latencia</th></tr></thead><tbody>${arca}</tbody></table></div>`;
  animateCounts();
}
/* ---------- CLIENTES ---------- */
async function vClientes(){
  const v=$('#view'); v.innerHTML='<p class="hint">Cargando…</p>';
  const {tenants}=await api('/api/tenants');

  // Empty state: sin certificados -> acceso directo guiado
  if(!tenants.length){
    v.innerHTML=`
     <div class="hero reveal" style="text-align:center">
       <div class="logo" style="margin:0 auto 14px;width:46px;height:46px;border-radius:12px"><svg viewBox="0 0 64 64" width="30" height="30" aria-hidden="true"><path fill="#fff" fill-rule="evenodd" d="M12 54 L12 24 A20 20 0 0 1 52 24 L52 54 L43 54 L43 24 A11 11 0 0 0 21 24 L21 54 Z"/><rect x="21" y="39" width="22" height="6" rx="1" fill="#fff"/></svg></div>
       <h2 style="margin:0 0 8px">Cargá tu primer certificado</h2>
       <p style="margin:0 auto 18px;max-width:56ch">Para emitir en ARCA necesitás un certificado digital. Generamos el pedido (CSR), lo subís a ARCA, y pegás el certificado que te devuelven. Toma un par de minutos.</p>
       <div class="row" style="justify-content:center">
         <button class="primary" onclick="nuevoCliente()">Cargar mi certificado</button>
         <button onclick="importarCert()">Ya tengo uno (importar)</button>
       </div>
     </div>`;
    return;
  }

  // Lista de clientes / representados
  const conCert=tenants.filter(t=>t.tieneCertificado).length;
  const rows=tenants.map(t=>{

const _fmt=n=>(+n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});

const _clean=s=>String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-+|-+$/g,'');
const _MMYYYY=d=>{const m=String(d||'').match(/^(\d{4})-(\d{2})/);return m?m[2]+m[1]:'';};
function nombrePdf(r){const per=_MMYYYY(r.pHasta||r.pDesde);return _clean(r.prof)+'_'+String(r.pv).padStart(5,'0')+'-'+String(r.num).padStart(8,'0')+(per?'_'+per:'')+'.pdf';}

function importarLote(input){
  const file=input.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const map={};
      data.forEach(r=>{
        const g=String(r.ComprobanteGlobal||'').trim(); if(!g) return;
        if(!map[g]) map[g]={global:g,obraSocial:r.ObraSocial||'',cuitOS:String(r.CuitObraSocial||''),presentacion:String(r.Presentacion||''),rows:[]};
        map[g].rows.push({prof:r.Profesional||'',mat:String(r.Matricula||''),resp:r.RespFiscal||'',tipo:String(r.TipoComprobante||'C'),pDesde:String(r.PeriodoDesde||''),pHasta:String(r.PeriodoHasta||''),
          exento:+r.Exento||0,gravado:+r.Gravado||0,iva:+r.IVA||0,total:(+r.Exento||0)+(+r.Gravado||0)+(+r.IVA||0),estado:'pend',cae:null,pv:null,num:null,err:null});
      });
      const nuevos=Object.values(map);
      input.value='';
      // Validación: un Comprobante global ya importado no se vuelve a traer ni se le suman líneas (mismo emisor)
      const existentes=new Set(LOTE.map(g=>g.global));
      const dups=nuevos.filter(ng=>existentes.has(ng.global));
      if(dups.length){
        PENDIMP=nuevos;
        const lista=dups.slice(0,15).map(d=>`<li><span class="mono">${d.global}</span>${d.obraSocial?(' · '+d.obraSocial):''}</li>`).join('');
        modal(`<h3>Comprobante global duplicado</h3>
          <p>Estos comprobantes globales <b>ya están importados</b> (mismo número y emisor). No se vuelven a importar ni se les suman líneas:</p>
          <ul style="margin:8px 0 0;padding-left:18px;font-size:13px;max-height:32vh;overflow:auto">${lista}${dups.length>15?`<li>…y ${dups.length-15} más</li>`:''}</ul>
          <div class="row" style="margin-top:14px"><button class="primary" onclick="confirmarImport(true)">Importar solo los nuevos</button><button onclick="confirmarImport(false)">Cancelar</button></div>`);
        return;
      }
      mergeLote(nuevos);
    }catch(err){ toast('No pude leer el Excel: '+err.message,true); }
  };
  rd.readAsArrayBuffer(file);
}

let PENDIMP=null;
function mergeLote(nuevos){
  const existentes=new Set(LOTE.map(g=>g.global));
  let added=0, skipped=0;

async function extraerDatosFactura(file){
  if(window.pdfjsLib && !pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  // 1) QR de ARCA (datos estructurados, incluye CAE y número)
  try{
    const viewport=page.getViewport({scale:2.5});
    const canvas=document.createElement('canvas');
    canvas.width=viewport.width; canvas.height=viewport.height;
    const ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport}).promise;
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const qr=jsQR(img.data,img.width,img.height);
    if(qr&&qr.data){
      const mp=qr.data.match(/[?&]p=([^&]+)/);
      if(mp){
        const b64=decodeURIComponent(mp[1]).replace(/-/g,'+').replace(/_/g,'/');
        const j=JSON.parse(decodeURIComponent(escape(atob(b64))));
        const cae=String(j.codAut||'');
        const num=(j.ptoVta&&j.nroCmp)?(String(j.ptoVta).padStart(4,'0')+'-'+String(j.nroCmp).padStart(8,'0')):'';
        if(cae) return {cae,numero:num,fuente:'QR'};
      }
    }
  }catch(e){}
  // 2) Fallback por texto
  try{
    const tc=await page.getTextContent();
    const txt=tc.items.map(i=>i.str).join(' ');
    const mcae=txt.match(/CAE\s*N?[°ºo:.\s]*?(\d{14})/i)||txt.match(/\b(\d{14})\b/);
    const mnum=txt.match(/(\d{4,5})\s*-\s*(\d{8})/);
    return {cae:mcae?mcae[1]:'', numero:mnum?(mnum[1].padStart(4,'0')+'-'+mnum[2]):'', fuente:'texto'};
  }catch(e){}
  return {cae:'',numero:'',fuente:null};
}

  const items=[...document.querySelectorAll('.bemail')].map(i=>({j:+i.dataset.j,email:i.value.trim()}));

  closeModal(); toast('Enviando solicitudes…');
  let ok=0, fail=0;
  for(const it of items){

        try{ await api('/api/solicitudes',{method:'POST',body:JSON.stringify({cuit:EMISOR_CUIT,global:g.global,obraSocial:g.obraSocial,cuitOS:g.cuitOS,profesional:r.prof,matricula:r.mat,email:it.email,total:r.total,periodoDesde:r.pDesde,periodoHasta:r.pHasta})}); }catch(_){}

async function extraerComprobantePyme(file){
  if(window.pdfjsLib && !pdfjsLib.GlobalWorkerOptions.workerSrc)
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const out={fuente:null};
  try{
    const viewport=page.getViewport({scale:2.5});
    const canvas=document.createElement('canvas');canvas.width=viewport.width;canvas.height=viewport.height;
    const ctx=canvas.getContext('2d');await page.render({canvasContext:ctx,viewport}).promise;
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const qr=jsQR(img.data,img.width,img.height);
    if(qr&&qr.data){
      const mp=qr.data.match(/[?&]p=([^&]+)/);
      if(mp){
        const b64=decodeURIComponent(mp[1]).replace(/-/g,'+').replace(/_/g,'/');
        const j=JSON.parse(decodeURIComponent(escape(atob(b64))));
        out.cuit=String(j.cuit||'').replace(/\D/g,'');
        out.punto_venta=+j.ptoVta||0;out.numero=+j.nroCmp||0;out.tipo_cbte=+j.tipoCmp||0;
        out.importe_total=+j.importe||0;out.cae=String(j.codAut||'');
        out.doc_tipo=+j.tipoDocRec||null;out.doc_nro=j.nroDocRec?String(j.nroDocRec):'';
        const f=String(j.fecha||'');
        out.fecha=/^\d{4}-\d{2}-\d{2}/.test(f)?f.slice(0,10):(/^\d{8}$/.test(f)?(f.slice(0,4)+'-'+f.slice(4,6)+'-'+f.slice(6,8)):'');
        out.fuente='QR';
      }
    }
  }catch(e){}
  try{
    const tc=await page.getTextContent();
    const txt=tc.items.map(i=>i.str).join(' ').replace(/\s+/g,' ');
    const before=txt.split(/RECEPTOR/i)[0]||txt;
    const after=txt.split(/RECEPTOR/i)[1]||'';
    if(!out.cuit){const m=before.match(/CUIT[\s:°ºN]*?(\d{11})/i);if(m)out.cuit=m[1];}
    const ml=txt.match(/FACTURA\s+([ABC])/i);
    out.tipoLetra=ml?ml[1].toUpperCase():({1:'A',6:'B',11:'C',201:'A',206:'B',211:'C'}[out.tipo_cbte]||'');
    if(!out.tipo_cbte&&out.tipoLetra)out.tipo_cbte={A:1,B:6,C:11}[out.tipoLetra];
    if(!out.punto_venta||!out.numero){const mpv=txt.match(/Punto de Venta[\s:]*?(\d{1,5})\D+N[º°o.]*\s*(\d{1,8})/i);if(mpv){out.punto_venta=out.punto_venta||+mpv[1];out.numero=out.numero||+mpv[2];}}
    if(!out.fecha){const mf=txt.match(/Fecha de emisi[óo]n[\s:]*?(\d{2})\/(\d{2})\/(\d{4})/i);if(mf)out.fecha=mf[3]+'-'+mf[2]+'-'+mf[1];}
    if(!out.importe_total){const mi=txt.match(/\$\s*([\d.]+,\d{2})\s*Importe Total/i)||txt.match(/Importe Total[\s:$]*?([\d.]+,\d{2})/i);if(mi)out.importe_total=parseFloat(mi[1].replace(/\./g,'').replace(',','.'));}
    if(!out.cae){const mc=txt.match(/CAE\s*N?[°ºo:.\s]*?(\d{14})/i);if(mc)out.cae=mc[1];}
    if(!out.cae_vto){const mv=txt.match(/Vto\.?\s*CAE[\s:]*?(\d{2})\/(\d{2})\/(\d{4})/i);if(mv)out.cae_vto=mv[3]+'-'+mv[2]+'-'+mv[1];}
    if(!out.doc_nro){const md=after.match(/(DNI|CUIT|CUIL)[\s\S]{0,40}?(\d{7,11})/i);if(md){out.doc_nro=md[2];out.doc_tipo=/DNI/i.test(md[1])?96:(/CUIL/i.test(md[1])?86:80);}}
    if(out.cuit||out.cae)out.fuente=out.fuente||'texto';
  }catch(e){}
  return out;
}

  if(d.cae){try{const r=await api('/api/comprobantes/existe-cae?cae='+encodeURIComponent(d.cae));dupCae=!!r.existe;dupInfo=r.comprobante;}catch(_){}}

  if(!d.fuente)alerts+=`<div style="background:#fff7e6;border:1px solid #f0d699;color:#8a6d1b;border-radius:8px;padding:10px 12px;margin-bottom:10px">No pude leer los datos automáticamente. Completá los campos a mano.</div>`;

  const bloque=emisorOk&&!dupCae;
  form.innerHTML=alerts+`
    <div class="f2">
      <div><label>CUIT emisor</label><input id="imp_cuit" class="mono" value="${cuitPdf}"></div>
      <div><label>Tipo</label><select id="imp_tipo">${opt('A','Factura A',tipoLetra==='A')}${opt('B','Factura B',tipoLetra==='B')}${opt('C','Factura C',tipoLetra==='C')}</select></div>
      <div><label>Punto de venta</label><input id="imp_pv" class="mono" value="${d.punto_venta||''}"></div>
      <div><label>Número</label><input id="imp_num" class="mono" value="${d.numero||''}"></div>
      <div><label>Fecha de emisión</label><input id="imp_fecha" type="date" value="${d.fecha||''}"></div>
      <div><label>Importe total</label><input id="imp_total" class="mono" value="${d.importe_total||''}"></div>
      <div><label>CAE</label><input id="imp_cae" class="mono" value="${d.cae||''}"></div>
      <div><label>Vto. CAE</label><input id="imp_vto" type="date" value="${d.cae_vto||''}"></div>
      <div><label>Tipo doc. receptor</label><select id="imp_doctipo">${opt('96','DNI',d.doc_tipo===96)}${opt('80','CUIT',d.doc_tipo===80)}${opt('86','CUIL',d.doc_tipo===86)}${opt('99','Consumidor final',!d.doc_tipo||d.doc_tipo===99)}</select></div>
      <div><label>Nº documento receptor</label><input id="imp_docnro" class="mono" value="${d.doc_nro||''}"></div>
      <div style="grid-column:1/-1"><label>Receptor (razón social / apellido y nombre)</label><input id="imp_recnom" value="${(d.receptorNombre||'').replace(/"/g,'&quot;')}"></div>
    </div>
    <div class="row" style="margin-top:16px">
      <button class="primary" ${bloque?'':'disabled'} onclick="registrarComprobantePyme()">Registrar comprobante</button>
      <button onclick="vImportarPyme()">Subir otro</button>
      ${d.fuente?('<span class="hint" style="margin-left:auto">Leído por '+(d.fuente==='QR'?'QR de ARCA':'texto del PDF')+'</span>'):''}
    </div>`;
}

function _montoImp(v){ v=String(v||'').trim(); if(/,\d{1,2}$/.test(v)) v=v.replace(/\./g,'').replace(',','.'); else v=v.replace(/,/g,''); const n=parseFloat(v); return isNaN(n)?0:n; }
async function registrarComprobantePyme(){
  const tipoLetra=$('#imp_tipo').value, tipo_cbte={A:1,B:6,C:11}[tipoLetra]||11;
  const body={
    perfil:'pyme',
    cuit:($('#imp_cuit').value||'').replace(/\D/g,''),
    tipo_cbte,
    punto_venta:parseInt(($('#imp_pv').value||'').replace(/\D/g,''))||0,
    numero:parseInt(($('#imp_num').value||'').replace(/\D/g,''))||0,
    fecha:$('#imp_fecha').value||null,
    cae_vto:$('#imp_vto').value||null,
    importe_total:_montoImp($('#imp_total').value),
    cae:($('#imp_cae').value||'').replace(/\D/g,''),
    doc_tipo:parseInt($('#imp_doctipo').value)||null,
    doc_nro:($('#imp_docnro').value||'').replace(/\D/g,''),
    receptorNombre:$('#imp_recnom').value||''
  };
  if(body.cuit.length!==11){toast('CUIT del emisor inválido',true);return;}
  if(!body.cae){toast('Falta el CAE',true);return;}
  if(!body.punto_venta||!body.numero){toast('Faltan punto de venta o número',true);return;}
  if(!EMISORES_VALIDOS.includes(body.cuit)){toast('El CUIT no corresponde a un emisor habilitado',true);return;}
  toast('Registrando…');
  try{
    const r=await api('/api/comprobantes/importar',{method:'POST',body:JSON.stringify(body)});
    if(r&&r.ok){ toast('Comprobante registrado'); vImportarPyme(); }
  }catch(e){ toast((e&&e.message)||'No se pudo registrar',true); }
}

function pymeTipos(){
  const cond=$('#pe_cond').value, sel=$('#pe_tipo');
  let html;
  if(cond==='RI'){
    html=`<optgroup label="Comprobantes A"><option value="1">Factura A</option><option value="2">Nota de Débito A</option><option value="3">Nota de Crédito A</option></optgroup>`

async function pymeEmitir(){
  const cuit=(($('#pe_emisor').value)||'').replace(/\D/g,''), tipo=+$('#pe_tipo').value, concepto=+$('#pe_concepto').value;
  const representante=(cuit && cuit!==REPRE_CERT && REPRESENTADOS.some(x=>x.cuit===cuit)) ? REPRE_CERT : '';
  const docTipo=+$('#pe_doctipo').value;
  let docNro=($('#pe_docnro').value||'').replace(/\D/g,''); if(docTipo===99) docNro='0';
  const recnom=$('#pe_recnom').value.trim(), fecha=$('#pe_fecha').value, detalle=($('#pe_detalle').value||'').trim();
  const esC=PYME_C_TYPES.includes(String(tipo));
  let neto=0, iva=0, total=0, alic=[];
  if(esC){ total=+($('#pe_total').value||0); neto=total; }
  else { neto=+($('#pe_neto').value||0); const a=+($('#pe_alic').value||0); iva=Math.round(neto*a)/100; total=neto+iva;
    if(iva>0) alic=[{id:(a===21?5:a===10.5?4:a===27?6:3), baseImponible:neto, importe:iva}]; }
  if(total<=0){ toast('Ingresá un importe válido',true); return; }
  const moneda=$('#pe_moneda').value, cotiz = moneda==='PES'?1:(+(($('#pe_cotiz')||{}).value||0));
  if(moneda!=='PES' && !(cotiz>0)){ toast('Ingresá la cotización del dólar',true); return; }
  const body={ cuit, perfil:PERFIL, representante: representante||undefined, puntoVenta:1, tipoComprobante:tipo, concepto, moneda, cotizacion:cotiz,
    tipoDocReceptor:docTipo, nroDocReceptor:docNro||'0',
    importeNeto: esC?total:neto, importeIva: esC?0:iva, importeTotal:total, alicuotasIva:alic,
    receptor:{ nombre:recnom||'Consumidor final', docTipo, docNro:docNro||'0' },
    fecha:fecha||undefined,
    items:[{descripcion:detalle||'Venta', cantidad:1, precioUnitario:total, bonif:0, subtotal:total}] };
  if(concepto===2||concepto===3){ const pd=($('#pe_pd')||{}).value, ph=($('#pe_ph')||{}).value, vto=($('#pe_vto')||{}).value;
    body.fechaServicioDesde=pd; body.fechaServicioHasta=ph; body.fechaVtoPago=vto; body.periodo={desde:pd,hasta:ph,vtoPago:vto}; }
  if(representante){ const rep=REPRESENTADOS.find(x=>x.cuit===cuit); if(rep) body.emisor={ razonSocial:rep.razon_social, domicilio:rep.domicilio, condicionIva:rep.condicion_iva, mipyme:rep.mipyme }; }
  $('#pe_result').innerHTML='<p class="hint">Emitiendo…</p>';
  try{
    const res=await api('/api/wsfev1/comprobantes',{method:'POST',body:JSON.stringify(body)});
    const c=res.comprobante;
    if(!c.aprobado) throw new Error((c.observaciones&&c.observaciones[0]&&c.observaciones[0].message)||(c.errores&&c.errores[0]&&c.errores[0].message)||'Rechazado por ARCA');
    const num=String(c.puntoVenta).padStart(5,'0')+'-'+String(c.numero).padStart(8,'0');
    const perBase = body.periodo ? (body.periodo.hasta||body.periodo.desde) : (fecha||'');
    const per=_MMYYYY(perBase);
    PYME_LAST={cuit:c.cuit,pv:c.puntoVenta,tipo:c.tipoComprobante,num:c.numero,nombre:_clean(recnom||'comprobante')+'_'+num+(per?'_'+per:'')+'.pdf'};
    $('#pe_result').innerHTML=`<div class="card" style="border:1px solid var(--ok)"><span class="tag ok">APROBADO</span> CAE <span class="mono">${c.cae}</span> · Emisor <span class="mono">${c.cuit}</span> · Comprobante <span class="mono">${num}</span> <button class="ghost" style="padding:3px 8px;margin-left:8px" onclick="descargarPymeLast()">PDF</button></div>`;
    toast('CAE obtenido: '+c.cae);
  }catch(e){ $('#pe_result').innerHTML=`<div class="card"><span class="tag no">RECHAZADO</span> ${e.message}</div>`; toast(e.message,true); }
}

function importarRepresentados(input){
  const file=input.files[0]; if(!file) return; input.value='';
  if(!REPRE_CERT){ toast('Cargá primero un certificado en Clientes',true); return; }
  const rd=new FileReader();
  rd.onload=async ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      const norm=k=>String(k||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
      const pick=(row,...keys)=>{ for(const k of Object.keys(row)){ if(keys.includes(norm(k))) return row[k]; } return ''; };
      let ok=0, fail=0;
      for(const row of data){
        const cuit=String(pick(row,'cuit')||'').replace(/\D/g,'');
        if(cuit.length!==11){ fail++; continue; }
        const body={ representante:REPRE_CERT, perfil:PERFIL, cuit,
          razonSocial:String(pick(row,'razonsocial','razon','nombre')||'').trim(),
          email:String(pick(row,'email','mail','correo')||'').trim(),
          condicionIva:String(pick(row,'condicioniva','condicion','iva')||'').trim()||'Responsable Inscripto',
          domicilio:String(pick(row,'domicilio','direccion')||'').trim(),
          mipyme:/^(si|true|x|1)$/i.test(String(pick(row,'mipyme','pyme')||'').trim()) };
        try{ await api('/api/representados',{method:'POST',body:JSON.stringify(body)}); ok++; }catch(_){ fail++; }
      }
      toast('Importados: '+ok+(fail?(' · '+fail+' con error/omitidos'):'')); vRepresentados();
    }catch(e){ toast('No pude leer el Excel: '+e.message,true); }
  };
  rd.readAsArrayBuffer(file);
}

    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const blob=await resp.blob();
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nombrePdfCbte(c);
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){ toast('No se pudo descargar el PDF',true); }
}
async function vComprobantes(){
  const v=$('#view');const {comprobantes}=await api('/api/comprobantes?perfil='+PERFIL);

  const rows=comprobantes.map((c,i)=>`<tr><td class="mono">${c.cuit}</td><td class="mono">${String(c.punto_venta).padStart(5,'0')}-${String(c.numero).padStart(8,'0')}</td><td>${c.tipo_cbte}</td>
    <td class="mono">${(c.fecha||'').slice?.(0,10)||c.fecha||''}</td><td class="mono">${c.cae||''}</td><td class="mono">$${Number(c.importe_total).toFixed(2)}</td>
    <td><button class="ghost" onclick="descargarCbtePdf(${i})">PDF</button></td></tr>`).join('')||'<tr><td colspan="7" class="hint">Todavía no emitiste comprobantes.</td></tr>';
  v.innerHTML=`<div class="row"><h2 style="margin:0">Comprobantes emitidos</h2><a href="/api/comprobantes/export.csv?perfil=${PERFIL}" style="margin-left:auto"><button>Exportar CSV</button></a></div>
   <div class="card" style="margin-top:12px;overflow-x:auto"><table><thead><tr><th>CUIT</th><th>N° Comprobante</th><th>Tipo</th><th>Fecha</th><th>CAE</th><th>Total</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ---------- GENERADOR DE CÓDIGO ---------- */
const GEN_PRESETS={
  'Emitir comprobante (CAE)':{m:'POST',p:'/api/wsfev1/comprobantes',b:{cuit:'20111111112',puntoVenta:1,tipoComprobante:11,concepto:1,tipoDocReceptor:99,nroDocReceptor:'0',importeNeto:100,importeIva:21,importeTotal:121,idempotencyKey:'venta-0001',alicuotasIva:[{id:5,baseImponible:100,importe:21}]}},
  'Último número autorizado':{m:'GET',p:'/api/wsfev1/ultimo-autorizado?cuit=20111111112&puntoVenta=1&tipoComprobante=11',b:null},
  'Consultar comprobante':{m:'GET',p:'/api/wsfev1/consultar?cuit=20111111112&puntoVenta=1&tipoComprobante=11&numero=1',b:null},
  'Estado WSFEv1 (dummy)':{m:'GET',p:'/api/wsfev1/status',b:null},
  'Consultar padrón A5 (constancia)':{m:'POST',p:'/api/ws/padron_a5/getPersona_v2',b:{cuit:'20111111112',params:{idPersona:'20111111112'}}},
  'Consultar padrón (A13)':{m:'GET',p:'/api/padron/a13/20111111112?cuit=20111111112',b:null},
  'e-Ventanilla: listar comunicaciones':{m:'GET',p:'/api/eventanilla/comunicaciones?cuit=20111111112',b:null},
  'e-Ventanilla: leer comunicación':{m:'GET',p:'/api/eventanilla/comunicacion/123456?cuit=20111111112',b:null},
  'e-Ventanilla: adjuntos (metadata)':{m:'GET',p:'/api/eventanilla/comunicacion/123456/adjuntos?cuit=20111111112',b:null},
  'e-Ventanilla: descargar PDF':{m:'GET',p:'/api/eventanilla/comunicacion/123456/adjunto?cuit=20111111112&n=0',b:null},
  'Genérico (cualquier servicio)':{m:'POST',p:'/api/ws/wsfev1/FEDummy',b:{cuit:'20111111112',params:{}}},
};
async function vGenerador(){
  const v=$('#view');
  let services=[];
  try{ services=(await api('/api/services')).servicios; }catch{}
  const opts=Object.keys(GEN_PRESETS).map(k=>`<option>${k}</option>`).join('');
  const svcOpts=services.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('');
  v.innerHTML=`<h2>Generador de código</h2>
   <p class="hint">Elegí el endpoint, completá los datos y copiá el nodo de n8n listo para pegar, o el snippet en tu lenguaje.</p>
   <div class="card" style="max-width:780px">
     <div class="f2"><div><label>Base URL <span class="hint">(para n8n en Docker: http://arcanum:8094)</span></label><input id="g_base" value="${location.origin}"></div>
     <div><label>API key (X-API-Key)</label><input id="g_key" value="TU_API_KEY" class="mono"></div></div>
     <label>Endpoint</label><select id="g_preset">${opts}</select>
     <div class="f2"><div><label>Método</label><select id="g_method"><option>GET</option><option>POST</option></select></div>
     <div><label>Ruta</label><input id="g_path" class="mono"></div></div>
     <label>Body (JSON) <span class="hint">— sólo para POST</span></label><textarea id="g_body" class="mono"></textarea>
   </div>
   <div class="card" style="max-width:780px;margin-top:14px">
     <strong>Explorar operaciones de un servicio</strong>
     <p class="hint">Lee el WSDL en vivo y te lista las operaciones y sus campos. Tocá "Usar" para cargarla en el generador.</p>
     <div class="row"><select id="g_svc" style="max-width:360px">${svcOpts}</select><button onclick="cargarOps()">Ver operaciones</button></div>
     <div id="g_ops" style="margin-top:10px"></div>
   </div>
   <div id="g_out" style="margin-top:16px"></div>`;
  $('#g_preset').onchange=applyPreset;
  ['g_base','g_key','g_method','g_path','g_body'].forEach(id=>$('#'+id).oninput=genAll);
  applyPreset();
}
async function cargarOps(){
  const id=$('#g_svc').value; $('#g_ops').innerHTML='<span class="hint">Leyendo WSDL…</span>';
  try{ const r=await api('/api/services/'+id+'/operaciones'); window._OPS={id,ops:r.operaciones};
    $('#g_ops').innerHTML=r.operaciones.map((o,i)=>`<div class="row" style="border-top:1px solid var(--line);padding:7px 0"><div><span class="mono">${o.nombre}</span>${o.parametros.length?' <span class="hint">('+o.parametros.map(p=>p.nombre).join(', ')+')</span>':''}</div><button class="ghost" style="margin-left:auto" onclick="usarOp(${i})">Usar</button></div>`).join('')||'<span class="hint">Sin operaciones legibles en el WSDL.</span>';
  }catch(e){ $('#g_ops').innerHTML='<span class="hint">'+e.message+'</span>'; }
}
function usarOp(i){
  const {id,ops}=window._OPS, o=ops[i], params={};
  o.parametros.forEach(p=>params[p.nombre]='');
  $('#g_preset').value='Genérico (cualquier servicio)';
  $('#g_method').value='POST'; $('#g_path').value='/api/ws/'+id+'/'+o.nombre;
  $('#g_body').value=JSON.stringify({cuit:'20111111112',params},null,2);
  genAll(); toast('Operación cargada: '+o.nombre);
}
function applyPreset(){const p=GEN_PRESETS[$('#g_preset').value];$('#g_method').value=p.m;$('#g_path').value=p.p;$('#g_body').value=p.b?JSON.stringify(p.b,null,2):'';genAll();}
function genAll(){
  const base=$('#g_base').value.replace(/\/$/,''),key=$('#g_key').value,m=$('#g_method').value,url=base+$('#g_path').value;
  let body=null;const raw=$('#g_body').value.trim();
  if(m==='POST'&&raw){try{body=JSON.parse(raw);}catch{body='__invalid__';}}
  const inv=body==='__invalid__';
  const blocks=[['n8n — copiá y pegá en el canvas',inv?'(JSON del body inválido)':genN8n(m,url,key,body)],
    ['cURL',inv?'(JSON del body inválido)':genCurl(m,url,key,body)],
    ['JavaScript (fetch)',inv?'(JSON del body inválido)':genJS(m,url,key,body)],
    ['Python (requests)',inv?'(JSON del body inválido)':genPy(m,url,key,body)]];
  $('#g_out').innerHTML=blocks.map((b,i)=>`<div class="card" style="margin-bottom:12px"><div class="row"><strong>${b[0]}</strong><button class="ghost" style="margin-left:auto" onclick="copyBlock(${i})">Copiar</button></div><pre id="gb${i}">${esc(b[1])}</pre></div>`).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function copyBlock(i){navigator.clipboard.writeText($('#gb'+i).textContent);toast('Copiado');}
function genCurl(m,url,key,body){let s=`curl -X ${m} "${url}" \\\n  -H "X-API-Key: ${key}"`;if(body){s+=` \\\n  -H "Content-Type: application/json" \\\n  -d '${JSON.stringify(body)}'`;}return s;}
function genJS(m,url,key,body){return `const res = await fetch(${JSON.stringify(url)}, {\n  method: ${JSON.stringify(m)},\n  headers: {\n    "X-API-Key": ${JSON.stringify(key)}${body?',\n    "Content-Type": "application/json"':''}\n  }${body?`,\n  body: JSON.stringify(${JSON.stringify(body,null,2)})`:''}\n});\nconst data = await res.json();\nconsole.log(data);`;}
function genPy(m,url,key,body){return `import requests\n\nr = requests.${m.toLowerCase()}(\n    ${JSON.stringify(url)},\n    headers={"X-API-Key": ${JSON.stringify(key)}}${body?`,\n    json=${pyLit(body,1)}`:''},\n)\nprint(r.json())`;}
function pyLit(v,ind){const pad='    '.repeat(ind),pad0='    '.repeat(ind-1);
  if(v===null)return 'None';if(v===true)return 'True';if(v===false)return 'False';
  if(typeof v==='number')return String(v);if(typeof v==='string')return JSON.stringify(v);
  if(Array.isArray(v)){return v.length?'[\n'+v.map(x=>pad+pyLit(x,ind+1)).join(',\n')+'\n'+pad0+']':'[]';}
  const ks=Object.keys(v);return ks.length?'{\n'+ks.map(k=>pad+JSON.stringify(k)+': '+pyLit(v[k],ind+1)).join(',\n')+'\n'+pad0+'}':'{}';}
function genN8n(m,url,key,body){
  const hasB=m==='POST'&&body;
  const node={parameters:{method:m,url:url,sendHeaders:true,headerParameters:{parameters:[{name:'X-API-Key',value:key}]},...(hasB?{sendBody:true,specifyBody:'json',jsonBody:JSON.stringify(body,null,2)}:{}),options:{}},
    id:'arcanum-http-1',name:'Arcanum',type:'n8n-nodes-base.httpRequest',typeVersion:4.2,position:[680,300]};
  return JSON.stringify({nodes:[node],connections:{}},null,2);
}

/* ---------- TEMA (claro/oscuro persistido) ---------- */
const I_SUN='<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const I_MOON='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
function setThemeIcon(){const dark=document.documentElement.getAttribute('data-theme')==='dark';const b=$('#themeBtn');if(b)b.innerHTML=dark?I_SUN:I_MOON;}
function toggleTheme(){const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.arcanumTheme=next;}catch(e){}setThemeIcon();}

/* ---------- Ojito mostrar/ocultar contraseña ---------- */
const I_EYE='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>';
const I_EYEOFF='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.9 5.1A10 10 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3 3.9M6.3 6.3A18 18 0 0 0 2 12s3.5 7 10 7a10 10 0 0 0 4-.8"/><path d="M3 3l18 18"/></svg>';
function pwField(id,ph,extra){return `<div class="pwwrap"><input id="${id}" type="password" ${extra||''} ${ph?'placeholder="'+ph+'"':''}><button class="eye" type="button" tabindex="-1" aria-label="Mostrar u ocultar" onclick="togglePw('${id}',this)">${I_EYE}</button></div>`;}
function togglePw(id,btn){const el=$('#'+id);const show=el.type==='password';el.type=show?'text':'password';btn.innerHTML=show?I_EYEOFF:I_EYE;}

/* ---------- MENÚ (rayitas): Acerca de + tema + entorno + salir ---------- */
const I_LOGOUT='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>';
function toggleMenu(){const m=$('#appmenu');const open=m.classList.toggle('open');if(open)renderMenu();}
async function renderMenu(){
  let cfg={entorno:ENV||'?',version:'?'};
  try{ cfg=await api('/api/config'); }catch{}
  const admin=['superadmin','admin'].includes(ME.role);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  $('#appmenu').innerHTML=`
   <div class="menu-sec"><div class="menu-h">Acerca de</div>
     <div class="menu-row"><span>Facturador Masivo</span><span class="mono">v${cfg.version}</span></div>
     <div class="menu-row"><span>Usuario</span><span class="mono">${ME.username}</span></div>
     <div class="menu-row"><span>Entorno</span><span class="tag ${cfg.entorno==='prod'?'warn':''}">${String(cfg.entorno).toUpperCase()}</span></div>
   </div>
   <div class="menu-sec"><div class="menu-h">Tema</div>
     <button class="menu-item" onclick="toggleTheme();renderMenu()">${dark?I_SUN:I_MOON}<span>${dark?'Tema claro':'Tema oscuro'}</span></button>
   </div>
   ${admin?`<div class="menu-sec"><div class="menu-h">Entorno ARCA</div>
     <div class="menu-row"><span>Operar contra</span>
       <select id="m_env" onchange="cambiarEntorno(this.value)">
         <option value="homo"${cfg.entorno==='homo'?' selected':''}>Homologación</option>
         <option value="prod"${cfg.entorno==='prod'?' selected':''}>Producción</option>
       </select></div>
     <div class="hint" style="padding:2px 12px 6px">Cambia los endpoints de ARCA para toda la instancia.</div></div>`:''}
   <div class="menu-sec"><button class="menu-item" onclick="logout()">${I_LOGOUT}<span>Salir</span></button></div>`;
}
async function cambiarEntorno(v){
  if(!confirm('¿Cambiar el entorno de ARCA a '+v.toUpperCase()+'? Afecta a toda la instancia.')){renderMenu();return;}
  try{ await api('/api/config/entorno',{method:'POST',body:JSON.stringify({entorno:v})}); toast('Entorno: '+v.toUpperCase()); location.reload(); }
  catch(e){ toast(e.message,true); renderMenu(); }
}
document.addEventListener('click',e=>{const m=$('#appmenu'),b=$('#menuBtn');if(m&&m.classList.contains('open')&&!m.contains(e.target)&&b&&!b.contains(e.target))m.classList.remove('open');});

setThemeIcon();
boot();
</script>
